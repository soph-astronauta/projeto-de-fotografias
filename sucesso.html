<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Formulário Enviado</title>

<style>

:root{
    --gold:#d4af37;
    --dark:#121212;
    --card:#1e1e1e;
    --text:#e5e5e5;
}

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:'Segoe UI',sans-serif;
}

body{
    background:linear-gradient(135deg,#121212,#1f1f1f);
    min-height:100vh;
    display:flex;
    justify-content:center;
    align-items:center;
    padding:20px;
    color:var(--text);
}

.container{
    width:100%;
    max-width:700px;
}

.card{
    background:var(--card);
    padding:50px;
    border-radius:25px;
    text-align:center;
    box-shadow:0 20px 50px rgba(0,0,0,.4);
    animation:fadeUp .8s ease;
}

.check{
    width:120px;
    height:120px;
    margin:0 auto 30px;
    border-radius:50%;
    background:var(--gold);
    display:flex;
    align-items:center;
    justify-content:center;
    font-size:60px;
    color:#000;
    animation:pop .6s ease;
}

h1{
    font-size:2.5rem;
    color:var(--gold);
    margin-bottom:15px;
}

p{
    font-size:1.1rem;
    line-height:1.8;
    color:#cfcfcf;
}

.btn{
    display:inline-block;
    margin-top:35px;
    padding:15px 35px;
    background:var(--gold);
    color:#000;
    text-decoration:none;
    border-radius:12px;
    font-weight:700;
    transition:.3s;
}

.btn:hover{
    transform:translateY(-3px);
    box-shadow:0 10px 25px rgba(212,175,55,.3);
}

@keyframes fadeUp{
    from{
        opacity:0;
        transform:translateY(30px);
    }
    to{
        opacity:1;
        transform:translateY(0);
    }
}

@keyframes pop{
    0%{
        transform:scale(0);
    }
    70%{
        transform:scale(1.15);
    }
    100%{
        transform:scale(1);
    }
}

@media(max-width:768px){

    .card{
        padding:35px 25px;
    }

    h1{
        font-size:2rem;
    }

    p{
        font-size:1rem;
    }

    .check{
        width:90px;
        height:90px;
        font-size:45px;
    }
}

</style>
</head>
<body>

<div class="container">

    <div class="card">

        <div class="check">✓</div>

        <h1>Parabéns!</h1>

        <p>
            Seu formulário foi enviado com sucesso.
            Recebemos suas informações e entraremos em contato o mais breve possível.
        </p>

        <p style="margin-top:15px;">
            Obrigado pela confiança. Sua solicitação já está sendo analisada.
        </p>

        <a href="index.html" class="btn">
            Voltar ao Início
        </a>

    </div>

</div>

</body>
</html>
