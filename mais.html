<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Menu | Rafael Lima</title>

<style>

header{
    position:fixed;
    top:0;
    left:0;
    width:100%;
    z-index:1000;
    background:rgba(0,0,0,.85);
    backdrop-filter:blur(10px);
    border-bottom:1px solid #222;
}

.navbar{
    max-width:1200px;
    margin:auto;
    padding:15px 25px;
    display:flex;
    justify-content:space-between;
    align-items:center;
}

.nav-left{
    display:flex;
    align-items:center;
    gap:15px;
}

.logo{
    font-size:1.2rem;
    letter-spacing:4px;
    font-weight:300;
}

.nav-menu{
    display:flex;
    align-items:center;
    gap:25px;
    list-style:none;
}

.nav-menu a{
    color:var(--white);
    text-decoration:none;
    text-transform:uppercase;
    font-size:.85rem;
    letter-spacing:2px;
    transition:.3s;
}

.nav-menu a:hover{
    color:var(--gold);
}


*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:'Segoe UI',sans-serif;
}

body{
    background:#000;
    color:#fff;
    min-height:100vh;
}

/* CABEÇALHO */

.header{
    text-align:center;
    padding:60px 20px 40px;
}

.header h1{
    font-size:3rem;
    font-weight:300;
    letter-spacing:10px;
}

.header p{
    color:#bfa15f;
    letter-spacing:5px;
    margin-top:10px;
}

/* TABELA MENU */

.menu-grid{
    max-width:1200px;
    margin:auto;
    padding:20px;

    display:grid;
    grid-template-columns:repeat(auto-fit,minmax(280px,1fr));
    gap:25px;
}

.menu-card{
    height:250px;

    text-decoration:none;
    color:white;

    border:1px solid rgba(255,255,255,.1);
    border-radius:15px;

    display:flex;
    align-items:center;
    justify-content:center;

    font-size:1.5rem;
    letter-spacing:4px;
    text-transform:uppercase;

    background:linear-gradient(
        135deg,
        #111,
        #1c1c1c
    );

    transition:.4s;
}

.menu-card:hover{
    transform:translateY(-8px);
    border-color:#bfa15f;
    box-shadow:0 20px 40px rgba(191,161,95,.2);
    color:#bfa15f;
}

/* RODAPÉ */

.footer{
    text-align:center;
    padding:50px 20px;
    color:#777;
}

@media(max-width:768px){

    .header h1{
        font-size:2rem;
        letter-spacing:5px;
    }

    .menu-card{
        height:180px;
        font-size:1.2rem;
    }

}

</style>
</head>
<body>

    <header>
        <nav class="navbar">
    
            <div class="nav-left">
    
                <div class="logo">
                    RAFAEL LIMA
                </div>
    
                <button class="hamburger" aria-label="Abrir Menu">
    
                    <span class="bar"></span>
                    <span class="bar"></span>
                    <span class="bar"></span>
    
                </button>
    
            </div>
    
            <ul class="nav-menu">
    
                <li><a href="index.html">Início</a></li>
        
        </li>
    
            </ul>
    
        </nav>
    </header>

<div class="header">

    <h1>RAFAEL LIMA</h1>

    <p>FOTÓGRAFO</p>

</div>

<div class="menu-grid">

    <a href="agendamentos.html" class="menu-card">
       Pagamentos
    </a>

    <a href="depoimentos.html" class="menu-card">
        Depoimentos
    </a>

    <a href="redes_sociais.html" class="menu-card">
        Redes Sociais
    </a>

    <a href="senha.html" class="menu-card">
        Galeria
    </a>
     <a href="pacotes.html" class="menu-card">
        Pacotes
    </a>
     <a href="formulario.html" class="menu-card">
        Agendamentos
    </a>





</div>

<div class="footer">

    © Rafael Lima Fotografia

</div>

</body>
</html>
