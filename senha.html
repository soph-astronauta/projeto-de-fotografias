<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Área do Cliente | Rafael Lima</title>

<style>

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:'Segoe UI',sans-serif;
}

body{
    background:#121212;
    color:#fff;
    min-height:100vh;
}

/* LOGIN */

#login-screen{
    display:flex;
    flex-direction:column;
    justify-content:center;
    align-items:center;
    min-height:100vh;
    padding:20px;
}

.login-box{
    background:#1e1e1e;
    padding:40px;
    border-radius:15px;
    width:100%;
    max-width:400px;
    text-align:center;
}

.login-box h2{
    color:#d4af37;
    margin-bottom:10px;
}

.login-box p{
    color:#aaa;
    margin-bottom:20px;
}

.login-box input{
    width:100%;
    padding:12px;
    border:none;
    border-radius:8px;
    background:#2a2a2a;
    color:white;
    margin-bottom:15px;
}

.login-box button{
    width:100%;
    padding:12px;
    border:none;
    border-radius:8px;
    background:#d4af37;
    color:#000;
    font-weight:bold;
    cursor:pointer;
}

#error-message{
    margin-top:10px;
    color:#ff5b5b;
    display:none;
}

/* GALERIA */

#gallery-screen{
    display:none;
    padding:40px 20px;
}

#gallery-screen h1{
    text-align:center;
    color:#d4af37;
    margin-bottom:10px;
}

.subtitulo{
    text-align:center;
    color:#aaa;
    margin-bottom:40px;
}

.grid-galeria{
    max-width:1400px;
    margin:auto;

    display:grid;
    grid-template-columns:
    repeat(auto-fit,minmax(300px,1fr));

    gap:25px;
}

.foto-card{
    background:#1e1e1e;
    border-radius:15px;
    overflow:hidden;
    transition:.3s;
}

.foto-card:hover{
    transform:translateY(-5px);
}

.foto-preview{
    width:100%;
    height:320px;
    object-fit:cover;
    display:block;
}

.info{
    padding:15px;
}

.info p{
    margin-bottom:15px;
    color:#ccc;
}

.btn-download{
    display:block;
    text-align:center;
    padding:12px;
    background:#d4af37;
    color:#000;
    text-decoration:none;
    border-radius:8px;
    font-weight:600;
}

.btn-download:hover{
    background:#e7c55c;
}

</style>
</head>

<body>

<!-- LOGIN -->

<div id="login-screen">

    <div class="login-box">

        <h2>Galeria Privada</h2>

        <p>Digite a senha para acessar suas fotos.</p>

        <input

            id="password-input"
            placeholder="Digite sua senha">

        <button onclick="verificarSenha()">
            Entrar
        </button>

        <div id="error-message">
            Senha incorreta.
        </div>

    </div>

</div>

<!-- GALERIA -->

<div id="gallery-screen">

    <h1>Ensaio Pré-Wedding</h1>

    <p class="subtitulo">

    </p>

    <div class="grid-galeria">

        <!-- FOTO 1 -->
        <div class="foto-card">

                <img src="img/Ensaio_rogerio_rafa_01.jpg" class="foto-preview">
            </a>

            <div class="info">
                <p>Ensaio_rogerio_rafa_01.jpg</p>

                <a href="img/Ensaio_rogerio_rafa_01.jpg"
                   download
                   class="btn-download">

                   ⬇ Baixar Foto

                </a>
            </div>
        </div>

        <!-- FOTO 2 -->
        <div class="foto-card">
            <a href="img/Ensaio_rogerio_rafa_02.jpg" download>
                <img src="img/Ensaio_rogerio_rafa_02.jpg" class="foto-preview">
            </a>

            <div class="info">
                <p>Ensaio_rogerio_rafa_02.jpg</p>

                <a href="img/Ensaio_rogerio_rafa_02.jpg"
                   download
                   class="btn-download">

                   ⬇ Baixar Foto

                </a>
            </div>
        </div>

        <!-- FOTO 3 -->
        <div class="foto-card">
            <a href="img/Ensaio_rogerio_rafa_03.jpg" download>
                <img src="img/Ensaio_rogerio_rafa_03.jpg" class="foto-preview">
            </a>

            <div class="info">
                <p>Ensaio_rogerio_rafa_03.jpg</p>

                <a href="img/Ensaio_rogerio_rafa_03.jpg"
                   download
                   class="btn-download">

                   ⬇ Baixar Foto

                </a>
            </div>
        </div>

        <!-- FOTO 4 -->

                   ⬇ Baixar Foto

            </div>
        </div>

    </div>

</div>

<script>

function verificarSenha(){

    const senhaCorreta = "marirafa76";

    const senha =
    document.getElementById("password-input").value;

    if(senha === senhaCorreta){

        document.getElementById("login-screen")
        .style.display = "none";

        document.getElementById("gallery-screen")
        .style.display = "block";

    }else{

        document.getElementById("error-message")
        .style.display = "block";

    }
}

document
.getElementById("password-input")
.addEventListener("keypress",function(e){

    if(e.key === "Enter"){
        verificarSenha();
    }

});

</script>

</body>
</html>
