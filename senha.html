<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Área do Cliente | Rafael Lima</title>

<style>

:root{
    --bg:#121212;
    --card:#1e1e1e;
    --card-hover:#252525;
    --gold:#d4af37;
    --white:#ffffff;
    --text:#d1d1d1;
}

/* RESET */
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:'Segoe UI',sans-serif;
}

body{
    background:var(--bg);
    color:var(--white);
    min-height:100vh;
}

/* HEADER */
header{
    position:fixed;
    top:0;
    left:0;
    width:100%;
    z-index:1000;
    background:rgba(0,0,0,.85);
    backdrop-filter:blur(12px);
    border-bottom:1px solid rgba(255,255,255,.08);
}

.navbar{
    max-width:1200px;
    margin:auto;
    padding:15px 25px;
    display:flex;
    justify-content:space-between;
    align-items:center;
}

.nav-left{
    display:flex;
    align-items:center;
    gap:15px;
}

.logo{
    font-size:1.1rem;
    letter-spacing:4px;
    font-weight:600;
    color:var(--gold);
}

.nav-menu{
    display:flex;
    align-items:center;
    gap:25px;
    list-style:none;
}

.nav-menu a{
    color:var(--white);
    text-decoration:none;
    text-transform:uppercase;
    font-size:.85rem;
    letter-spacing:2px;
    transition:.3s;
}

.nav-menu a:hover{
    color:var(--gold);
}

/* HAMBURGER */
.hamburger{
    display:none;
    background:none;
    border:none;
    cursor:pointer;
}

.bar{
    display:block;
    width:25px;
    height:3px;
    margin:5px 0;
    background:white;
    border-radius:5px;
}

/* LOGIN */
#login-screen{
    display:flex;
    justify-content:center;
    align-items:center;
    min-height:100vh;
    padding:20px;
}

.login-box{
    width:100%;
    max-width:420px;
    background:var(--card);
    padding:40px;
    border-radius:20px;
    text-align:center;
    box-shadow:0 10px 30px rgba(0,0,0,.4);
}

.login-box h2{
    margin-bottom:20px;
    color:var(--gold);
}

.login-box input{
    width:100%;
    padding:14px;
    margin-top:15px;
    border:none;
    border-radius:10px;
    background:#2a2a2a;
    color:white;
    outline:none;
    transition:.3s;
}

.login-box input:focus{
    border:1px solid var(--gold);
    box-shadow:0 0 10px rgba(212,175,55,.3);
}

.login-box button{
    width:100%;
    margin-top:15px;
    padding:14px;
    border:none;
    border-radius:10px;
    background:var(--gold);
    color:black;
    font-weight:bold;
    cursor:pointer;
    transition:.3s;
}

.login-box button:hover{
    transform:translateY(-2px);
    filter:brightness(1.1);
}

/* GALERIA */
#gallery-screen{
    display:none;
    padding:120px 20px 50px;
}

#gallery-screen h1{
    margin-bottom:10px;
    text-align:center;
    color:var(--gold);
}

#gallery-screen h2{
    margin-bottom:40px;
    text-align:center;
    color:#c4c3c1;
    font-weight:300;
}

.grid-galeria{
    max-width:1200px;
    margin:auto;
    display:grid;
    grid-template-columns:repeat(auto-fit,minmax(280px,1fr));
    gap:25px;
}

/* CARD FOTO */
.foto-card{
    background:var(--card);
    border-radius:18px;
    overflow:hidden;
    transition:.35s ease;
    box-shadow:0 5px 20px rgba(0,0,0,.25);
}

.foto-card:hover{
    transform:translateY(-6px);
    background:var(--card-hover);
}

.foto-preview{
    width:100%;
    height:320px;
    object-fit:cover;
    cursor:pointer;
    transition:.4s;
}

.foto-card:hover .foto-preview{
    transform:scale(1.03);
}

.info{
    padding:15px;
}

.btn-download{
    width:100%;
    padding:12px;
    border:none;
    border-radius:10px;
    background:var(--gold);
    color:black;
    cursor:pointer;
    font-weight:700;
    transition:.3s;
}

.btn-download:hover{
    filter:brightness(1.1);
    transform:translateY(-2px);
}

/* LIGHTBOX */
#lightbox{
    display:none;
    position:fixed;
    inset:0;
    background:rgba(0,0,0,.96);
    z-index:9999;
    justify-content:center;
    align-items:center;
    animation:fadeIn .3s ease;
}

#lightbox-img{
    max-width:90%;
    max-height:90vh;
    border-radius:12px;
    box-shadow:0 0 40px rgba(0,0,0,.7);
}

#fechar-lightbox{
    position:absolute;
    top:20px;
    right:30px;
    font-size:50px;
    color:white;
    cursor:pointer;
    transition:.3s;
}

#fechar-lightbox:hover{
    color:var(--gold);
}

/* ANIMAÇÕES */
@keyframes fadeIn{
    from{
        opacity:0;
    }
    to{
        opacity:1;
    }
}

/* RESPONSIVO */
@media(max-width:768px){

    .navbar{
        padding:15px;
    }

    .logo{
        font-size:.95rem;
        letter-spacing:2px;
    }

    .nav-menu{
        gap:15px;
    }

    .grid-galeria{
        grid-template-columns:1fr;
    }

    .foto-preview{
        height:260px;
    }

    #gallery-screen{
        padding-top:100px;
    }

    .login-box{
        padding:30px;
    }
}

</style>
</head>

<body>
    <header>
        <nav class="navbar">
    
            <div class="nav-left">
    
                <div class="logo">
                    RAFAEL LIMA
                </div>
    
                <button class="hamburger" aria-label="Abrir Menu">
    
                    <span class="bar"></span>
                    <span class="bar"></span>
                    <span class="bar"></span>
    
                </button>
    
            </div>
    
            <ul class="nav-menu">
    
                <li><a href="mais.html">Voltar</a></li>
        
        </li>
    
            </ul>
    
        </nav>
    </header>


<!-- LOGIN -->
<div id="login-screen">
    <div class="login-box">
        <h2>Galeria Privada</h2>

        <input type="password" id="password-input" placeholder="Digite sua senha">

        <button onclick="verificarSenha()">Entrar</button>
    </div>
</div>

<!-- GALERIA -->
<div id="gallery-screen">

    <h1 style="text-align:center; color:#d4af37;">Ensaio Pré-Wedding</h1>
     <h2 style="text-align:center; color:#c4c3c1;">Mariana e Rafael</h2>

    <div class="grid-galeria" id="galeria"></div>

</div>

<!-- LIGHTBOX -->
<div id="lightbox">
    <span id="fechar-lightbox">&times;</span>
    <img id="lightbox-img">
</div>

<script>

function verificarSenha(){

    const senhaCorreta = "marirafa76";
    const senha = document.getElementById("password-input").value;

    if(senha === senhaCorreta){
        document.getElementById("login-screen").style.display = "none";
        document.getElementById("gallery-screen").style.display = "block";
        carregarGaleria();
    }
}

/* FOTOS */
const fotos = [
    "Ensaio_rogerio_rafa_01.jpg",
    "Ensaio_rogerio_rafa_02.jpg",
    "Ensaio_rogerio_rafa_03.jpg",
    "Ensaio_rogerio_rafa_04.jpg"
];

function carregarGaleria(){

    const galeria = document.getElementById("galeria");

    fotos.forEach(foto => {

        galeria.innerHTML += `
            <div class="foto-card">

                <img src="img/${foto}"
                     class="foto-preview"
                     data-foto="${foto}">

                <div class="info">

                    <button class="btn-download"
                        onclick="baixarImagem('${foto}')">

                        ⬇ Baixar Foto

                    </button>

                </div>

            </div>
        `;
    });

    ativarLightbox();
}

/* LIGHTBOX */
function ativarLightbox(){

    const lightbox = document.getElementById("lightbox");
    const imgLight = document.getElementById("lightbox-img");
    const fechar = document.getElementById("fechar-lightbox");

    document.querySelectorAll(".foto-preview").forEach(img => {

        img.addEventListener("click", () => {
            lightbox.style.display = "flex";
            imgLight.src = img.src;
        });

    });

    fechar.onclick = () => lightbox.style.display = "none";

    lightbox.onclick = (e) => {
        if(e.target === lightbox){
            lightbox.style.display = "none";
        }
    };
}

/* DOWNLOAD FORÇADO */
async function baixarImagem(nomeArquivo){

    try{

        const response = await fetch(`img/${nomeArquivo}`);

        const blob = await response.blob();

        const url = window.URL.createObjectURL(blob);

        const a = document.createElement("a");
        a.href = url;
        a.download = nomeArquivo;

        document.body.appendChild(a);
        a.click();
        a.remove();

        window.URL.revokeObjectURL(url);

    }catch(err){
        alert("A imagem não pode ser baixada no momento ");
        console.log(err);
    }
}

</script>

</body>
</html>
