<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Área do Cliente | Rafael Lima</title>

<style>

/* LIGHTBOX */
#lightbox{
    display:none;
    position:fixed;
    inset:0;
    background:rgba(0,0,0,.95);
    z-index:9999;
    justify-content:center;
    align-items:center;
}

#lightbox-img{
    max-width:90%;
    max-height:90vh;
    border-radius:10px;
}

#fechar-lightbox{
    position:absolute;
    top:20px;
    right:30px;
    font-size:50px;
    color:white;
    cursor:pointer;
    font-weight:bold;
}

/* GERAL */
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:'Segoe UI',sans-serif;
}

body{
    background:#121212;
    color:#fff;
}

/* LOGIN */
#login-screen{
    display:flex;
    flex-direction:column;
    justify-content:center;
    align-items:center;
    min-height:100vh;
}

.login-box{
    background:#1e1e1e;
    padding:40px;
    border-radius:15px;
    width:100%;
    max-width:400px;
    text-align:center;
}

.login-box input{
    width:100%;
    padding:12px;
    margin-top:15px;
    border:none;
    border-radius:8px;
    background:#2a2a2a;
    color:#fff;
}

.login-box button{
    width:100%;
    margin-top:10px;
    padding:12px;
    border:none;
    border-radius:8px;
    background:#d4af37;
    font-weight:bold;
    cursor:pointer;
}

/* GALERIA */
#gallery-screen{
    display:none;
    padding:40px 20px;
}

.grid-galeria{
    max-width:1200px;
    margin:auto;
    display:grid;
    grid-template-columns:repeat(auto-fit,minmax(280px,1fr));
    gap:20px;
}

.foto-card{
    background:#1e1e1e;
    border-radius:15px;
    overflow:hidden;
}

.foto-preview{
    width:100%;
    height:300px;
    object-fit:cover;
    cursor:pointer;
}

.info{
    padding:15px;
}

.btn-download{
    display:block;
    width:100%;
    padding:10px;
    margin-top:10px;
    background:#d4af37;
    color:#000;
    border:none;
    border-radius:8px;
    cursor:pointer;
    font-weight:bold;
}

</style>
</head>

<body>

<!-- LOGIN -->
<div id="login-screen">
    <div class="login-box">
        <h2>Galeria Privada</h2>

        <input type="password" id="password-input" placeholder="Digite sua senha">

        <button onclick="verificarSenha()">Entrar</button>
    </div>
</div>

<!-- GALERIA -->
<div id="gallery-screen">

    <h1 style="text-align:center; color:#d4af37;">Ensaio Pré-Wedding</h1>

    <div class="grid-galeria" id="galeria"></div>

</div>

<!-- LIGHTBOX -->
<div id="lightbox">
    <span id="fechar-lightbox">&times;</span>
    <img id="lightbox-img">
</div>

<script>

function verificarSenha(){

    const senhaCorreta = "marirafa76";
    const senha = document.getElementById("password-input").value;

    if(senha === senhaCorreta){
        document.getElementById("login-screen").style.display = "none";
        document.getElementById("gallery-screen").style.display = "block";
        carregarGaleria();
    }
}

/* FOTOS */
const fotos = [
    "Ensaio_rogerio_rafa_01.jpg",
    "Ensaio_rogerio_rafa_02.jpg",
    "Ensaio_rogerio_rafa_03.jpg",
    "Ensaio_rogerio_rafa_04.jpg"
];

function carregarGaleria(){

    const galeria = document.getElementById("galeria");

    fotos.forEach(foto => {

        galeria.innerHTML += `
            <div class="foto-card">

                <img src="img/${foto}"
                     class="foto-preview"
                     data-foto="${foto}">

                <div class="info">

                    <button class="btn-download"
                        onclick="baixarImagem('${foto}')">

                        ⬇ Baixar Foto

                    </button>

                </div>

            </div>
        `;
    });

    ativarLightbox();
}

/* LIGHTBOX */
function ativarLightbox(){

    const lightbox = document.getElementById("lightbox");
    const imgLight = document.getElementById("lightbox-img");
    const fechar = document.getElementById("fechar-lightbox");

    document.querySelectorAll(".foto-preview").forEach(img => {

        img.addEventListener("click", () => {
            lightbox.style.display = "flex";
            imgLight.src = img.src;
        });

    });

    fechar.onclick = () => lightbox.style.display = "none";

    lightbox.onclick = (e) => {
        if(e.target === lightbox){
            lightbox.style.display = "none";
        }
    };
}

/* DOWNLOAD FORÇADO */
async function baixarImagem(nomeArquivo){

    try{

        const response = await fetch(`img/${nomeArquivo}`);

        const blob = await response.blob();

        const url = window.URL.createObjectURL(blob);

        const a = document.createElement("a");
        a.href = url;
        a.download = nomeArquivo;

        document.body.appendChild(a);
        a.click();
        a.remove();

        window.URL.revokeObjectURL(url);

    }catch(err){
        alert("A imagem não pode ser baixada no momento ");
        console.log(err);
    }
}

</script>

</body>
</html>
